      margin: 0;
      background: #1a2a3a;

    #app-loading {
      position: fixed;

      font-size: 12px;
      margin-top: 10px;

    }

    .l-p {
      width: 140px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-top: 25px;
      overflow: hidden;
    }

    .l-f {
      width: 100%;
      height: 100%;
      background: white;
      transform-origin: left;
      animation: loader 2s infinite ease-in-out;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes loader {
      0% {
        transform: translateX(-100%);
      }

      50% {

      }
