<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/home-storage/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://openrouter.ai; img-src 'self' data: blob: https://firebasestorage.googleapis.com https://*.supabase.co https://*.googleusercontent.com https://api.iconify.design; media-src 'self' data: blob:;">
  <!-- 性能优化：预连接 Firebase Storage 域名，提前建立 TLS 连接 -->
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
  <!-- 性能优化：DNS 预解析 -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <title>HomeBox - 智能家庭储物管理</title>
  <style>
    body {
      margin: 0;
      background: #000000;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    .l-c {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .l-b {
      width: 80px;
      height: 80px;
      border: 3px solid #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .l-b::after {
      content: "📦";
      font-size: 36px;
    }

    .l-t {
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .l-s {
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .l-p {
      width: 120px;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      margin-top: 24px;
      overflow: hidden;
    }

    .l-f {
      width: 100%;
      height: 100%;
      background: #FF3000;
      transform-origin: left;
      animation: loader 1.5s infinite ease-in-out;
    }

    @keyframes loader {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="app-loading">
      <div class="l-c">
        <div class="l-b"></div>
        <div class="l-t">HOMEBOX</div>
        <div class="l-s">正在开启您的智能家庭云柜</div>
        <div class="l-p">
          <div class="l-f"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
