<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/home-storage/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>HomeBox - 智能家庭储物管理</title>
  <style>
    :root {
      --brand: #63b3ed;
      --bg-gradient: linear-gradient(135deg, #1a2a3a 0%, #2A4D63 100%);
    }

    body {
      margin: 0;
      background: #1a2a3a;
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: float 3s infinite ease-in-out;
    }

    .home-icon-group {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
    }

    .main-box {
      position: absolute;
      inset: 0;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 2;
      animation: boxPulse 2s infinite ease-in-out;
    }

    .main-box svg {
      width: 50px;
      height: 50px;
      color: #3B6D8C;
    }

    .orbit-icon {
      position: absolute;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .icon-1 {
      top: -20px;
      right: -20px;
      animation: orbit 4s infinite linear;
    }

    .icon-2 {
      bottom: -10px;
      left: -30px;
      animation: orbit 4s infinite linear reverse;
    }

    .loading-text {
      color: white;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-top: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .loading-sub {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .progress-container {
      width: 180px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-top: 30px;
      overflow: hidden;
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      background: white;
      transform-origin: left;
      animation: loader 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes orbit {
      0% {
        transform: rotate(0deg) translate(50px) rotate(0deg);
      }

      100% {
        transform: rotate(360deg) translate(50px) rotate(-360deg);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes boxPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes loader {
      0% {
        transform: translateX(-100%);
      }

      50% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="app-loading">
      <div class="loading-content">
        <div class="home-icon-group">
          <div class="main-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
              <path d="m3.3 7 8.7 5 8.7-5" />
              <path d="M12 22V12" />
            </svg>
          </div>
          <div class="orbit-icon icon-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" />
              <path d="M3 9V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4" />
              <path d="M13 13h4" />
              <path d="M13 17h4" />
            </svg>
          </div>
          <div class="orbit-icon icon-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 2v8" />
              <path d="m2 8 8 2 8-2" />
              <path d="M2 12c.3 3.5 1.7 6.7 4 9" />
              <path d="M7 16c.3 3.5 1.7 6.7 4 9" />
              <path d="M12 2v8" />
              <rect width="20" height="20" x="2" y="2" rx="2" />
            </svg>
          </div>
        </div>
        <div class="loading-text">HOMEBOX</div>
        <div class="loading-sub">正在开启智能家庭云柜...</div>
        <div class="progress-container">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
